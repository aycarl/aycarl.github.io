<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      const location = window.location;
      const normalizedPath = location.pathname.replace(/^\/+/, "");
      const normalizedSearch = location.search ? `?${location.search.slice(1).replace(/&/g, "~and~")}` : "";
      const hashPath = normalizedPath ? `#/${normalizedPath}${normalizedSearch}${location.hash}` : "#/";
      location.replace(`${location.protocol}//${location.hostname}${location.port ? `:${location.port}` : ""}/${hashPath}`);
    </script>
  </head>
  <body></body>
</html>
