<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>aycarl.</title>
    <script>
      (function (location) {
        if (location.search[1] === "/") {
          const decodedPath = location.search
            .slice(1)
            .split("&")
            .map((segment) => segment.replace(/~and~/g, "&"))
            .join("?");
          const hashPath = decodedPath.startsWith("/") ? decodedPath : `/${decodedPath}`;
          window.history.replaceState(null, "", `${location.pathname}#${hashPath}${location.hash}`);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
