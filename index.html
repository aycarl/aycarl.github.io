<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
      Baseline SEO / Open Graph / Twitter tags — this is the single source of
      tag STRUCTURE for the whole site. Edge functions (functions/writing/[slug].ts,
      functions/projects/[slug].ts, and the per-route static functions added by
      the SEO work) REWRITE these tags in place via src/lib/seo.ts#injectMeta
      (Cloudflare HTMLRewriter, setAttribute/setInnerContent only). They never
      append duplicate tags. If you add/remove a tag here, update injectMeta's
      selector list in the same change.
    -->
    <title>aycarl. — Full-Stack Software Developer</title>
    <meta name="description" content="I'm a full-stack developer & AI Engineer. I help teams figure out where AI can genuinely make their work easier, then I build it." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://aycarl.com/" />

    <meta property="og:site_name" content="aycarl." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="aycarl. — Full-Stack Software Developer & AI Engineer" />
    <meta property="og:description" content="I'm a Full-Stack Software Developer & AI Engineer. I help teams figure out where AI can genuinely make their work easier, then I build it." />
    <meta property="og:url" content="https://aycarl.com/" />
    <meta property="og:image" content="https://aycarl.com/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="aycarl. — Full-Stack Software Developer & AI Engineer" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="aycarl. — Full-Stack Software Developer & AI Engineer" />
    <meta name="twitter:description" content="I'm a Full-Stack Software Developer & AI Engineer. I help teams figure out where AI can genuinely make their work easier, then I build it." />
    <meta name="twitter:image" content="https://aycarl.com/og-default.png" />

    <link rel="alternate" type="application/rss+xml" title="aycarl — Writing" href="/feed.xml" />

    <!--
      Person + WebSite JSON-LD, static rather than edge-injected: Cloudflare
      Pages Functions routing does not reliably invoke a function for the
      bare "/" path when a literal index.html asset exists at that path
      (confirmed against wrangler pages dev; see functions/*.ts history for
      the removed functions/index.ts). Keep this in sync with
      personJsonLd()/webSiteJsonLd() in src/lib/seo.ts.
    -->
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"Person","name":"Carl Yao Agbenyega","alternateName":"aycarl.","url":"https://aycarl.com","jobTitle":"Full-Stack Software Developer","sameAs":["https://github.com/aycarl","https://www.linkedin.com/in/aycarl"]}</script>
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"WebSite","name":"aycarl.","url":"https://aycarl.com","potentialAction":{"@type":"SearchAction","target":"https://aycarl.com/writing/search?q={search_term_string}","query-input":"required name=search_term_string"}}</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
